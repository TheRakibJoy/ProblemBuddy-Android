name: Publish APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Stage APK + metadata
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%d)"
          VERSION_NAME="$(grep -E '^\s*versionName' app/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')"

          mkdir -p /tmp/publish
          cp app/build/outputs/apk/release/app-release.apk "/tmp/publish/ProblemBuddy-${VERSION_NAME}-${SHORT_SHA}.apk"
          cp app/build/outputs/apk/release/app-release.apk "/tmp/publish/ProblemBuddy-latest.apk"

          cat > /tmp/publish/README.md <<EOF
          # ProblemBuddy — Direct APK downloads

          | File | Commit | Built |
          | ---- | ------ | ----- |
          | [ProblemBuddy-latest.apk](ProblemBuddy-latest.apk) | ${SHORT_SHA} | ${BUILD_DATE} |
          | [ProblemBuddy-${VERSION_NAME}-${SHORT_SHA}.apk](ProblemBuddy-${VERSION_NAME}-${SHORT_SHA}.apk) | ${SHORT_SHA} | ${BUILD_DATE} |

          ## Install

          1. Download the APK on your Android device.
          2. Allow "Install unknown apps" for your browser/file-manager (one-time Android prompt).
          3. Open the APK → Install.

          APKs are signed with a debug key, so Android will warn you about the source. That's expected for direct side-loading.

          Rebuilt automatically by \`.github/workflows/publish-apk.yml\` on every push to \`main\`.
          EOF

      - name: Push to downloads branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build a completely clean orphan tree in a scratch worktree so we
          # can't accidentally capture build intermediates (which contain the
          # Firebase client key and other resources that should never land in
          # the downloads branch).
          SCRATCH="$(mktemp -d)"
          cp -r /tmp/publish/. "$SCRATCH"/
          cd "$SCRATCH"
          git init -q -b downloads
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Explicit, narrow add — never `-A` here.
          git add ProblemBuddy-*.apk README.md
          git commit -q -m "Publish APK ${GITHUB_SHA::7}"
          git push --force origin downloads
